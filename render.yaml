services:
  - type: web
    name: shift-management-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.backend.app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shift-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: PYTHON_VERSION
        value: 3.10.0

databases:
  - name: shift-db
    databaseName: shift_db
    user: shift_user
